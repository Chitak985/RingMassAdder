@Kopernicus:FINAL
{
  @Body,*
  {
    @Rings
    {
      @Ring,*
      {
        // Set up default values
        &rmaRingDensity = 1000               // Default to Saturn B ring density, 400-1400 kg/m2
        &rmaRingPercent = 1                  // Default to fully filled in ring

        // Set up values
        radius = #$../../Properties/radius$  // Get the radius in meters
        innerRadius2 = #$innerRadius$        // Copy innerRadius
        outerRadius2 = #$outerRadius$        // Copy outerRadius

        // Convert to meters
        @innerRadius2 /= 1000                 // Turn into radius factor
        @innerRadius2 *= radius               // Turn into meters
        @outerRadius2 /= 1000                 // Turn into radius factor
        @outerRadius2 *= radius               // Turn into meters

        // Get area => outerRadius2
        @innerRadius2 *= innerRadius2         // pi[r^2]
        @innerRadius2 *= 3.1415926            // [pi]r^2
        @outerRadius2 *= outerRadius2         // pi[r^2]
        @outerRadius2 *= 3.1415926            // [pi]r^2
        @outerRadius2 -= innerRadius2         // Subtract inner from outer to get ring area in m2

        // Convert to kilograms
        @outerRadius2 *= rmaRingPercent       // Get the actual area of the ring by removing empty area
                                              // Multiply by 1 to get volume
        @outerRadius2 *= rmaRingDensity       // Multiply by density to get mass of the ring

        // Add to body
        @../../Properties/mass += outerRadius2
        
        // Clean up
        !rmaRingDensity = DEL
        !rmaRingPercent = DEL
        !innerRadius2 = DEL
        !outerRadius2 = DEL
        !radius = DEL
      }
    }
  }
}
